name: DriftLogic
options:
  bundleIdPrefix: com.driftlogic
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
targets:
  DriftLogic:
    type: application
    platform: iOS
    sources:
      - path: DriftLogic
    resources:
      - path: DriftLogic/Assets.xcassets
      - path: DriftLogic/Resources
    settings:
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      PRODUCT_BUNDLE_IDENTIFIER: com.driftlogic.app
      GENERATE_INFOPLIST_FILE: YES
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
      SWIFT_VERSION: "5.0"
      TARGETED_DEVICE_FAMILY: "1,2"
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
      INFOPLIST_KEY_CFBundleDisplayName: DriftLogic
      INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.sports
  DriftLogicTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DriftLogicTests
    dependencies:
      - target: DriftLogic
    settings:
      GENERATE_INFOPLIST_FILE: YES
      PRODUCT_BUNDLE_IDENTIFIER: com.driftlogic.app.tests
